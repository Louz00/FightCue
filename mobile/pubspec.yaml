name: fightcue_mobile
description: FightCue mobile app for Android and iOS
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  firebase_core: ^4.3.0
  firebase_messaging: ^16.0.4
  google_mobile_ads: ^7.0.0
  in_app_purchase: ^3.2.3
  intl: ^0.20.2
  http: ^1.5.0
  shared_preferences: ^2.5.3
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/app_icon.png
  adaptive_icon_background: "#D30F2F"
  adaptive_icon_foreground: assets/branding/app_icon.png
  remove_alpha_ios: true

flutter_native_splash:
  color: "#FAF8F5"
  image: assets/branding/splash_logo.png
  android_12:
    color: "#FAF8F5"
    image: assets/branding/splash_logo.png
  ios: true
  android: true
  web: false
